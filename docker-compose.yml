version: '3.8'

services:
  # Flask API Service
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - VLLM_URL=http://vllm:8000/v1/completions
      - VLLM_MODEL=microsoft/phi-2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MAX_TOKENS=512
      - TEMPERATURE=0.1
    depends_on:
      - qdrant
      - vllm
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - inventory-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - inventory-network

  # vLLM Server with Phi-2
  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model microsoft/phi-2
      --host 0.0.0.0
      --port 8000
      --max-model-len 2048
      --dtype float16
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    networks:
      - inventory-network

volumes:
  qdrant_data:
  huggingface_cache:

networks:
  inventory-network:
    driver: bridge
